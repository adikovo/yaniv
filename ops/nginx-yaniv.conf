# nginx reverse proxy for the Yaniv server (reference config for the VM).
#
# Install on the VM as /etc/nginx/sites-available/yaniv, replace the
# server_name placeholder with your DuckDNS host, enable it, then run
# `sudo certbot --nginx -d <host>` — certbot adds the :443 TLS server block
# and the 80->443 redirect automatically.
#
# The Node server listens on 127.0.0.1:3000 (PORT); nginx is the only
# public-facing listener.

server {
    listen 80;
    server_name YOUR_SUBDOMAIN.duckdns.org;   # <-- replace with your DuckDNS host

    location / {
        proxy_pass http://127.0.0.1:3000;

        # Required for Socket.io websockets to pass through nginx.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
